[pytest]
# ─── Configurazione pytest ────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Aggiunge path root per import corretti
pythonpath = .

# Output verboso di default
addopts =
    --tb=short
    --strict-markers
    -v

# Marcatori custom
markers =
    unit: Test unitari (nessun I/O)
    integration: Test di integrazione (file system reale)
    concurrency: Test di concorrenza (multi-processo)
    regression: Test di regressione (riproduzione bug risolti)
    slow: Test lenti (> 2s)

# Timeout default per ogni test (richiede pytest-timeout)
# timeout = 30
